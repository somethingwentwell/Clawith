services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: clawith
      POSTGRES_PASSWORD: clawith
      POSTGRES_DB: clawith
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U clawith" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        CLAWITH_PIP_INDEX_URL: ${CLAWITH_PIP_INDEX_URL:-}
        CLAWITH_PIP_TRUSTED_HOST: ${CLAWITH_PIP_TRUSTED_HOST:-}
    restart: unless-stopped
    command: ["/bin/bash", "/app/entrypoint.sh"]
    environment:
      DATABASE_URL: postgresql+asyncpg://clawith:clawith@postgres:5432/clawith
      REDIS_URL: redis://redis:6379/0
      AGENT_DATA_DIR: /data/agents
      AGENT_TEMPLATE_DIR: /app/agent_template
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-secret}
      CORS_ORIGINS: '["*"]'
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      DOCKER_NETWORK: clawith_network
      SS_CONFIG_FILE: /data/ss-nodes.json
    volumes:
      - ./backend:/app
      - ./backend/agent_data:/data/agents
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ss-nodes.json:/data/ss-nodes.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3008}:3000"
      - "80:80"
      - "443:443"
    environment:
      VITE_API_URL: http://localhost:8000
      DOMAIN: ${DOMAIN:-}
      ENABLE_SSL: ${ENABLE_SSL:-false}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - backend

  certbot:
    image: certbot/certbot:latest
    entrypoint: ["/bin/sh", "/scripts/certbot-entrypoint.sh"]
    environment:
      DOMAIN: ${DOMAIN:-}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
      - ./certbot-entrypoint.sh:/scripts/certbot-entrypoint.sh:ro
    depends_on:
      - frontend
    profiles:
      - ssl

volumes:
  pgdata:
  redisdata:
  certbot_www:
  certbot_conf:


networks:
  default:
    name: clawith_network
